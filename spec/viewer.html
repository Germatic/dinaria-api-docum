<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Specification — Dinaria</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
    .toolbar {
      background: #0f1117;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #1e2130;
    }
    .toolbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .toolbar-logo img {
      width: 28px; height: 28px; border-radius: 5px; object-fit: cover;
    }
    .toolbar-logo span {
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 600;
    }
    .scope-label {
      color: #94a3b8;
      font-size: 13px;
      margin-left: auto;
    }
    .chip {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid transparent;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      background: #1e2130;
      color: #94a3b8;
      transition: all 0.15s;
    }
    .chip.active-arg {
      background: #1e3a5f;
      color: #60a5fa;
      border-color: #2563eb44;
    }
    .chip.active-bra {
      background: #14532d;
      color: #4ade80;
      border-color: #16a34a44;
    }
    .back-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      margin-left: 8px;
    }
    .back-link:hover { color: #f1f5f9; }
    #swagger-ui { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info { margin: 20px 0; }
  </style>
</head>
<body>

<div class="toolbar">
  <a class="toolbar-logo" href="../index.html">
    <img src="https://dinariap.github.io/dinaria-api-docs/assets/images/dinaria-logo.jpg" alt="Dinaria" />
    <span>API Reference</span>
  </a>
  <a href="../index.html" class="back-link">&#8592; Back to Docs</a>
  <span class="scope-label">Scope:</span>
  <button class="chip active-arg" id="btn-arg" onclick="loadSpec('argentina')">Argentina (CBU)</button>
  <button class="chip" id="btn-bra" onclick="loadSpec('brazil')">Brazil (PIX)</button>
</div>

<div id="swagger-ui"></div>

<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist/swagger-ui-bundle.js"></script>
<script>
  let ui = null;
  let currentSpec = null;

  function loadSpec(scope) {
    const url = scope === 'brazil'
      ? 'dinaria_API_bra_V1.8.yaml'
      : 'dinaria_API_arg_V1.8.yaml';

    if (url === currentSpec) return;
    currentSpec = url;

    document.getElementById('btn-arg').className = 'chip' + (scope === 'argentina' ? ' active-arg' : '');
    document.getElementById('btn-bra').className = 'chip' + (scope === 'brazil'    ? ' active-bra' : '');
    localStorage.setItem('dinaria-scope', scope);

    if (ui) {
      ui.specActions.updateUrl(url);
      ui.specActions.download(url);
      return;
    }

    ui = SwaggerUIBundle({
      url: url,
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1,
      displayRequestDuration: true,
      tryItOutEnabled: false,
    });
  }

  // Init: query param takes priority over localStorage
  const params = new URLSearchParams(window.location.search);
  const saved = params.get('scope') || localStorage.getItem('dinaria-scope') || 'argentina';
  loadSpec(saved);
</script>
</body>
</html>
